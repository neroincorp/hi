<style>
* {
box-sizing: border-box;
}
body {
margin: 0;
height: 100vh;
overflow: hidden;
display: flex;
justify-content: center;
align-items: center;
font-family: Arial, sans-serif;
font-size: 4rem;
background: black;
color: white;
transition: 0.5s;
}
.text {
z-index: 1;
font-weight: 600;
}
/* Buttons */
button {
position: fixed;
right: 25px;
cursor: pointer;
border: 1px solid rgba(255,255,255,0.2);
border-radius: 18px;
backdrop-filter: blur(10px);
transition: 0.3s ease;
z-index: 2;
}
button:hover {
transform: scale(1.08);
}
/* Theme button */
#themeButton {
top: 25px;
padding: 12px 22px;
font-size: 15px;
background: rgba(255,255,255,0.15);
color: white;
}
/* Music button */
#musicButton {
top: 80px;
width: 55px;
height: 55px;
padding: 10px;
background: rgba(255,255,255,0.15);
}
#musicButton img {
width: 100%;
height: 100%;
object-fit: contain;
}
/* Light mode */
.light-mode {
background: white;
color: black;
}
.light-mode #themeButton {
background: black;
color: white;
border-color: black;
}
.light-mode #musicButton {
background: black;
border-color: black;
}
/* Falling particles */
.particle {
position: absolute;
top: -20px;
width: 7px;
height: 7px;
background: currentColor;
border-radius: 50%;
opacity: 0.25;
animation: fall linear infinite;
pointer-events: none;
}
@keyframes fall {
from {
transform: translateY(-20px);
}
to {
transform: translateY(110vh);
}
}
</style>
</head>
<body>
<button id="themeButton" onclick="toggleMode()">
Light Mode
</button>
<button id="musicButton" onclick="toggleMusic()">
<img src="music.png" alt="Music">
</button>
<div class="text" id="mainText">
Hello
</div>
<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>
<script>
function toggleMode() {
document.body.classList.toggle("light-mode");
const button = document.getElementById("themeButton");
if (document.body.classList.contains("light-mode")) {
button.textContent = "Dark Mode";
} else {
button.textContent = "Light Mode";
}
}
const music = document.getElementById("music");
function toggleMusic() {
if (music.paused) {
music.play();
} else {
music.pause();
}
}
for (let i = 0; i < 60; i++) {
let particle = document.createElement("div");
particle.className = "particle";
particle.style.left = Math.random() * 100 + "vw";
particle.style.animationDuration =
(6 + Math.random() * 12) + "s";
particle.style.animationDelay =
Math.random() * 10 + "s";
let size = Math.random() * 6 + 3;
particle.style.width = size + "px";
particle.style.height = size + "px";
document.body.appendChild(particle);
}
const firebaseConfig = {
apiKey: "AIzaSyC7x4DWlLcIpjWYt-aN0LBUNan2KMKoWOk",
authDomain: "visitors-31b6e.firebaseapp.com",
databaseURL: "https://visitors-31b6e-default-rtdb.firebaseio.com",
projectId: "visitors-31b6e",
storageBucket: "visitors-31b6e.firebasestorage.app",
messagingSenderId: "1078510458740",
appId: "1:1078510458740:web:1bf30af84374203c68fe21",
measurementId: "G-MT7TYW2R8M"
};
async function getLocation() {
let base = { city: "unknown", region: "unknown", country: "unknown", ip: null };
try {
const res = await fetch("https://ipwho.is/");
const data = await res.json();
if (data.success !== false) {
base = {
city: data.city || "unknown",
region: data.region || "unknown",
country: data.country || "unknown",
ip: data.ip || null
};
}
} catch (e) {}
if (!base.ip) {
try {
const res2 = await fetch("https://ipapi.co/json/");
const data2 = await res2.json();
if (!data2.error) {
base = {
city: data2.city || "unknown",
region: data2.region || "unknown",
country: data2.country_name || "unknown",
ip: data2.ip || null
};
}
} catch (e) {}
}
base.vpn = "unknown";
try {
const vpnRes = await fetch(`https://proxycheck.io/v2/?key=public-9633m3-717708-o78146&vpn=1&asn=1`);
const vpnData = await vpnRes.json();
console.log("proxycheck response:", vpnData);
if ((vpnData.status === "ok" || vpnData.status === "warning") && vpnData[vpnData.ip]) {
const entry = vpnData[vpnData.ip];
base.vpn = entry.proxy === "yes" ? (entry.type || "yes") : "no";
}
} catch (e) {
console.log("proxycheck fetch failed:", e);
}
return base;
}
function sanitizeIp(ip) {
return ip.replace(/[.#$\[\]\/:]/g, "_");
}
(async () => {
try {
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const location = await getLocation();
if (location.ip) {
const banSnap = await db.ref("bannedIPs/" + sanitizeIp(location.ip)).once("value");
if (banSnap.exists() && banSnap.val() === true) {
const overlay = document.createElement("div");
overlay.style.cssText = `
position: fixed;
inset: 0;
z-index: 9999;
background: rgba(0,0,0,0.5);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
`;
overlay.innerHTML = `
<div style="
background: #141414;
border: 1px solid rgba(255,255,255,0.12);
border-radius: 16px;
padding: 32px 36px;
max-width: 360px;
text-align: center;
font-family: Arial, sans-serif;
box-shadow: 0 20px 60px rgba(0,0,0,0.6);
">
<div style="font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 10px;">You've Been Banned</div>
<div style="font-size: 0.9rem; color: rgba(255,255,255,0.65); line-height: 1.5;">
Your IP address has been blocked from accessing this site.
</div>
<div style="font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-top: 20px; font-family: monospace;">
Error Code: 403 — Forbidden
</div>
</div>
`;
document.body.appendChild(overlay);
return;
}
}

db.ref("siteMessage").on("value", (snapshot) => {
const val = snapshot.val();
if (val) {
document.getElementById("mainText").textContent = val;
}
});
const presenceRef = db.ref("presence");
const myPresenceRef = presenceRef.push();
myPresenceRef.onDisconnect().remove();
myPresenceRef.set({
joinedAt: firebase.database.ServerValue.TIMESTAMP,
userAgent: navigator.userAgent,
location: location
});
const historyRef = db.ref("history").push();
historyRef.onDisconnect().update({
leftAt: firebase.database.ServerValue.TIMESTAMP
});
historyRef.set({
joinedAt: firebase.database.ServerValue.TIMESTAMP,
leftAt: null,
userAgent: navigator.userAgent,
location: location
});
} catch (e) {
console.error("Visitor presence unavailable:", e);
}
})();
</script>
</body>
</html>
